apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: asset-spy
spec:
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: nastss6tx5/asset-spy-auth-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx192m -Xmx192m"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 192Mi
              cpu: 200m